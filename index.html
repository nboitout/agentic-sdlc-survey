<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coding / Agentic SDLC Maturity Questionnaire</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>AI Coding / Agentic SDLC Maturity Questionnaire</h1>
      <p id="subtitle">Run monthly to track movement across Stage 1-5 maturity.</p>
    </header>

    <form id="survey-form">
      <section class="meta">
        <h2 id="meta-title">Survey Metadata</h2>
        <div class="field">
          <label for="language" id="language-label">Language</label>
          <select id="language" name="language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="ro">Română</option>
            <option value="pt">Português</option>
          </select>
        </div>
        <div class="field">
          <label for="surveyDate" id="surveyDate-label">Survey date</label>
          <input type="date" id="surveyDate" name="surveyDate" required />
        </div>
        <div class="field">
          <label for="teamName" id="teamName-label">Team / Group name</label>
          <input type="text" id="teamName" name="teamName" placeholder="Optional" />
        </div>
        <div class="field">
          <label for="respondent" id="respondent-label">Respondent name</label>
          <input type="text" id="respondent" name="respondent" placeholder="Optional" />
        </div>
      </section>

      <div id="questions"></div>

      <section class="actions">
        <div class="field">
          <label for="endpoint" id="endpoint-label">Google Apps Script Web App URL</label>
          <input type="url" id="endpoint" name="endpoint" placeholder="https://script.google.com/macros/s/.../exec" required />
        </div>
        <button type="submit" id="submit-btn">Submit Survey</button>
        <button type="button" id="save-draft">Save Draft Locally</button>
      </section>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
