<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coding / Agentic SDLC Maturity Questionnaire</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>AI Coding / Agentic SDLC Maturity Questionnaire</h1>
      <p>Run monthly to track movement across Stage 1-5 maturity.</p>
    </header>

    <form id="survey-form">
      <section class="meta">
        <h2>Survey Metadata</h2>
        <div class="field">
          <label for="surveyDate">Survey date</label>
          <input type="date" id="surveyDate" name="surveyDate" required />
        </div>
        <div class="field">
          <label for="teamName">Team / Group name</label>
          <input type="text" id="teamName" name="teamName" placeholder="Optional" />
        </div>
        <div class="field">
          <label for="respondent">Respondent name</label>
          <input type="text" id="respondent" name="respondent" placeholder="Optional" />
        </div>
      </section>

      <div id="questions"></div>

      <section class="actions">
        <div class="field">
          <label for="endpoint">Google Apps Script Web App URL</label>
          <input type="url" id="endpoint" name="endpoint" placeholder="https://script.google.com/macros/s/.../exec" required />
        </div>
        <button type="submit">Submit Survey</button>
        <button type="button" id="save-draft">Save Draft Locally</button>
      </section>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
